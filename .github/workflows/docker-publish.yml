name: Build and Push Docker Image

# Builds multi-arch (linux/amd64 + linux/arm64) images and pushes them to
# Docker Hub at mrtbot/mesh-api.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  - your Docker Hub username (e.g. mrtbot)
#   DOCKERHUB_TOKEN     - a Docker Hub access token (Account Settings -> Security)
#
# Triggers:
#   - Publishing a GitHub Release  -> tags :latest, :<release-tag>, :<major.minor>
#   - Manual "Run workflow"        -> tags :latest (and an optional custom tag)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      custom_tag:
        description: "Optional extra image tag (in addition to :latest)"
        required: false
        default: ""

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mrtbot/mesh-api
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.event.inputs.custom_tag }},enable=${{ github.event.inputs.custom_tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
